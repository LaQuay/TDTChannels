name: Catalog validation

on:
  pull_request:
    paths:
      - TELEVISION.md
      - RADIO.md
      - pr_review/validate_catalog.py
      - pr_review/tests/test_validate_catalog.py
      - .github/workflows/catalog-validation.yml

permissions:
  contents: read

concurrency:
  group: catalog-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate catalog changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s pr_review/tests -v

      - name: Run blocking deterministic validation
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python pr_review/validate_catalog.py

      - name: Run advisory stream availability checks
        continue-on-error: true
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python pr_review/validate_catalog.py --network
